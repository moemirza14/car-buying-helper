server {
    # Listen on 8080 so we can run as non-root (ports <1024 need root)
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check endpoint for Kubernetes probes
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Cache the HTML briefly (so deploys propagate quickly)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Long cache for static assets if/when you add them
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|woff2?|ttf|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
